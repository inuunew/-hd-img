<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HD Photo Enhancer</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
    input, select, button { margin: 10px; font-size: 16px; }
    #result { margin-top: 20px; }
    .url-box { 
      background: #f5f5f5; 
      padding: 12px; 
      border-radius: 6px; 
      word-break: break-all; 
      font-family: monospace; 
      margin: 10px 0;
      text-align: left;
    }
    .copy-btn { 
      background: #0070f3; 
      color: white; 
      border: none; 
      padding: 8px 16px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 14px;
    }
    .copy-btn:hover { background: #005bb5; }
    .download-link { 
      display: inline-block; 
      margin-top: 10px; 
      color: #0070f3; 
      text-decoration: none; 
    }
  </style>
</head>
<body>
  <h1>✨ HD Photo Enhancer</h1>
  <p>Unggah foto & pilih skala pembesaran</p>
  <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp">
  <select id="scaleSelect">
    <option value="4">4x (Ultra HD)</option>
    <option value="2">2x (HD)</option>
  </select>
  <button onclick="enhance()">Enhance</button>
  <div id="status"></div>
  <div id="result"></div>

  <script>
    async function enhance() {
      const fileInput = document.getElementById('imageInput');
      const file = fileInput.files[0];
      if (!file) return alert('Pilih foto dulu');

      const scale = document.getElementById('scaleSelect').value;

      const formData = new FormData();
      formData.append('image', file);

      // Kirim scale sebagai query parameter
      const url = `/api/enhance?scale=${scale}`;

      document.getElementById('status').innerText = 'Memproses...';
      document.getElementById('result').innerHTML = '';

      try {
        const res = await fetch(url, { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          document.getElementById('status').innerHTML = `✅ Berhasil! (${data.scale_applied || scale}x, ${data.engine || 'auto'})`;
          document.getElementById('result').innerHTML = `
            <div class="url-box" id="urlText">${data.resultUrl}</div>
            <button class="copy-btn" onclick="copyUrl()">📋 Salin URL</button>
            <br>
            <a class="download-link" href="${data.resultUrl}" download target="_blank">⬇️ Download Gambar</a>
          `;
        } else {
          document.getElementById('status').innerText = '❌ Gagal: ' + data.error;
        }
      } catch (e) {
        document.getElementById('status').innerText = '❌ Error: ' + e.message;
      }
    }

    function copyUrl() {
      const urlText = document.getElementById('urlText').innerText;
      navigator.clipboard.writeText(urlText).then(() => {
        alert('URL berhasil disalin!');
      }).catch(() => {
        alert('Gagal menyalin, silakan copy manual.');
      });
    }
  </script>
</body>
</html>

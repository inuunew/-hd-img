<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Photo Enhancer</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
    input, button { margin: 10px; }
    #result { margin-top: 20px; }
    img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h1>✨ HD Photo Enhancer</h1>
  <p>Unggah foto, dapatkan versi Ultra HD</p>
  <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp">
  <button onclick="enhance()">Enhance</button>
  <div id="status"></div>
  <div id="result"></div>

  <script>
    async function enhance() {
      const fileInput = document.getElementById('imageInput');
      const file = fileInput.files[0];
      if (!file) return alert('Pilih foto dulu');

      const formData = new FormData();
      formData.append('image', file);

      document.getElementById('status').innerText = 'Memproses...';
      document.getElementById('result').innerHTML = '';

      try {
        const res = await fetch('/enhance', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          document.getElementById('status').innerText = 'Berhasil!';
          document.getElementById('result').innerHTML = `
            <a href="${data.resultUrl}" target="_blank">
              <img src="${data.resultUrl}" alt="Hasil HD">
            </a>
            <p><a href="${data.resultUrl}" download>Download Gambar</a></p>
          `;
        } else {
          document.getElementById('status').innerText = 'Gagal: ' + data.error;
        }
      } catch (e) {
        document.getElementById('status').innerText = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
